serenity {
    take.screenshots = FOR_EACH_ACTION
    screenshot.height = 1024
    screenshot.width = 1024
    verbose.screenshots = true
    reports.outdir = "target/site/serenity"
}

webdriver {
    driver = chrome
    autodriver = true
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1000,800",
                "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-extensions"]
        }
    }
}

environments {
    default {
        webdriver.base.url = "http://localhost:3000"
        catalog.api.url = "http://localhost:50001"
        inventory.api.url = "http://localhost:50002"
    }
    dev {
        webdriver.base.url = "http://localhost:3000"
        catalog.api.url = "http://localhost:50001"
        inventory.api.url = "http://localhost:50002"
    }
    ci {
        webdriver.base.url = "http://web-app:3000"
        catalog.api.url = "http://catalog-api:50001"
        inventory.api.url = "http://inventory-api:50002"
    }
    prod {
        webdriver.base.url = "https://speckit.local"
        catalog.api.url = "https://api.speckit.local/catalog"
        inventory.api.url = "https://api.speckit.local/inventory"
    }
}

# Configuración de Serenity BDD (HOCON format)
webdriver {
  driver = chrome
  autodriver = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["test-type", "ignore-certificate-errors", "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "http://localhost:3000"
  }
  staging {
    webdriver.base.url = "http://staging.ticketing.com"
  }
}

serenity {
  project.name = "Ticketing UI Automation (Screenplay)"
  test.root = "co.com.ticketing.ui"
  console.colors = true
  logging = VERBOSE
  # Screenplay specific:
  take.screenshots = FOR_EACH_ACTION
}

serenity {
    take.screenshots = FOR_EACH_ACTION
}

webdriver {
    driver = chrome
    autodriver = true
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
            args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "--window-size=1000,800",
                "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-extensions"]
        }
    }
}

environments {
    default {
        webdriver.base.url = "http://localhost:3000"
        catalog.api.url = "http://localhost:50001"
    }
    dev {
        webdriver.base.url = "http://localhost:3000"
        catalog.api.url = "http://localhost:5001"
    }
    prod {
        webdriver.base.url = "https://speckit.local"
        catalog.api.url = "https://api.speckit.local"
    }
}
